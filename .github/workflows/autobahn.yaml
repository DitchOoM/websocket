name: "Autobahn Conformance"

# Runs the RFC 6455 Autobahn conformance suite (AutobahnCase*) for every platform as an
# independent, parallel job so one slow/failing target doesn't serialize the rest.
#
# Two execution models (chosen per platform):
#   * Gradle jobs (JVM, JS-Node, JS-Browser, Apple, Android): `<task> -PintegrationTests` — the
#     build auto-starts the fuzzingserver (AutobahnDockerTask) and validates the platform's agent
#     via a `finalizedBy validateAutobahnResults<Platform>` finalizer.
#   * Native jobs (Linux x64/arm64): the test binary is compiled ONCE in `build-native`, uploaded,
#     then each arch job downloads the kexe, starts the fuzzingserver, runs only Autobahn cases,
#     and validates with .github/scripts/validate_autobahn.py.
#
# Every job uploads its fuzzingserver report (.docker/reports/clients) as an artifact.

on:
  pull_request:
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
      - '.editorconfig'
  workflow_dispatch:

concurrency:
  group: autobahn-${{ github.ref }}
  cancel-in-progress: true

env:
  # Only the RFC conformance cases (categories 1-13). AutobahnStress* is factory-matrix coverage
  # whose pass/fail is judged by the JUnit assertion, not per-case fuzzingserver validation.
  AUTOBAHN_FILTER: "com.ditchoom.websocket.AutobahnCase*"

jobs:
  # ----------------------------------------------------------------------------- Gradle: JVM / JS
  jvm:
    name: "JVM"
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: gradle
      - name: Run Autobahn (JVM)
        run: ./gradlew jvmTest -PintegrationTests --tests "$AUTOBAHN_FILTER" --no-build-cache
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autobahn-report-jvm
          path: .docker/reports/clients
          retention-days: 7
      # On failure, upload post-mortem traces: heap dumps (incl. direct-buffer OOM), JVM crash logs,
      # and the full test reports (stdout has the per-case trace + any OOM stack).
      - name: Upload JVM diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: autobahn-jvm-diagnostics
          path: |
            **/build/oom-dumps/**
            **/build/reports/tests/**
            **/build/test-results/**
            **/hs_err_pid*.log
            **/hs_err_pid*.mdmp
          retention-days: 7
          if-no-files-found: ignore

  js-node:
    name: "JS (Node)"
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: gradle
      - name: Run Autobahn (jsNode)
        # Dump a V8 heap snapshot if Node approaches its heap limit, for post-mortem of a JS OOM.
        env:
          NODE_OPTIONS: --heapsnapshot-near-heap-limit=2
        run: ./gradlew jsNodeTest -PintegrationTests --tests "$AUTOBAHN_FILTER" --no-build-cache
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autobahn-report-jsnode
          path: .docker/reports/clients
          retention-days: 7
      # On failure: test reports (per-test stdout holds the JS error/stack) + any V8 heap snapshot.
      - name: Upload JS (Node) diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: autobahn-jsnode-diagnostics
          path: |
            **/build/reports/tests/**
            **/build/test-results/**
            **/*.heapsnapshot
          retention-days: 7
          if-no-files-found: ignore

  js-browser:
    name: "JS (Browser)"
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    # Non-blocking for now: --tests AutobahnCase* bypasses the build's per-case browser exclusions
    # (browser can't reach some cases — reserved close codes, window-bits control). Conformance for
    # the reachable cases passes; the JUnit task fails on the unreachable ones. Harden in follow-up.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: gradle
      - uses: browser-actions/setup-chrome@v1
      - name: Run Autobahn (jsBrowser)
        run: ./gradlew jsBrowserTest -PintegrationTests --tests "$AUTOBAHN_FILTER" --no-build-cache
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autobahn-report-jsbrowser
          path: .docker/reports/clients
          retention-days: 7
      # On failure: test reports capture the Karma/ChromeHeadless console output + failure stacks.
      - name: Upload JS (Browser) diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: autobahn-jsbrowser-diagnostics
          path: |
            **/build/reports/tests/**
            **/build/test-results/**
            **/build/reports/karma/**
          retention-days: 7
          if-no-files-found: ignore

  # -------------------------------------------------------- Native: compile once, run per arch
  build-native:
    name: "Build native test binaries"
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: gradle
      - name: Cache Konan
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-linux-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-linux-
      - name: Link Linux test binaries
        run: ./gradlew linkDebugTestLinuxX64 linkDebugTestLinuxArm64 --no-build-cache
      - name: Upload linuxX64 kexe
        uses: actions/upload-artifact@v4
        with:
          name: test-binary-linuxX64
          path: build/bin/linuxX64/debugTest/test.kexe
          retention-days: 1
      - name: Upload linuxArm64 kexe
        uses: actions/upload-artifact@v4
        with:
          name: test-binary-linuxArm64
          path: build/bin/linuxArm64/debugTest/test.kexe
          retention-days: 1

  linux-x64:
    name: "Linux x64 (native)"
    needs: build-native
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4   # for .docker/config + validation scripts
      - name: Download test binary
        uses: actions/download-artifact@v4
        with:
          name: test-binary-linuxX64
      - name: Start fuzzingserver
        run: bash .github/scripts/start_fuzzingserver.sh
      - name: Run Autobahn (linuxX64)
        run: |
          mkdir -p native-diagnostics
          ulimit -c unlimited
          # Route core dumps next to the binary so a native crash (SIGSEGV/SIGABRT/OOM) is uploadable.
          sudo sysctl -w kernel.core_pattern="$PWD/native-diagnostics/core.%e.%p" >/dev/null 2>&1 || true
          chmod +x test.kexe
          # Tee stderr — Kotlin/Native prints the crash backtrace there — into an artifact file.
          set -o pipefail
          ./test.kexe "--ktest_gradle_filter=$AUTOBAHN_FILTER" 2>&1 | tee native-diagnostics/output.txt
      - name: Validate results
        run: python3 .github/scripts/validate_autobahn.py LinuxX64
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autobahn-report-linuxx64
          path: .docker/reports/clients
          retention-days: 7
      - name: Upload Linux x64 diagnostics (backtrace / core dump)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: autobahn-linuxx64-diagnostics
          path: native-diagnostics
          retention-days: 7
          if-no-files-found: ignore

  linux-arm64:
    name: "Linux arm64 (native)"
    needs: build-native
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 40
    # Non-blocking: the amd64-only fuzzingserver runs under QEMU emulation here, which is slow for
    # the heavy compression cases. The arm64 TEST BINARY runs natively; only the server is emulated.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Download test binary
        uses: actions/download-artifact@v4
        with:
          name: test-binary-linuxArm64
      - name: Set up QEMU (run amd64 fuzzingserver on arm64)
        uses: docker/setup-qemu-action@v3
      - name: Start fuzzingserver
        run: bash .github/scripts/start_fuzzingserver.sh
      - name: Run Autobahn (linuxArm64)
        run: |
          mkdir -p native-diagnostics
          ulimit -c unlimited
          sudo sysctl -w kernel.core_pattern="$PWD/native-diagnostics/core.%e.%p" >/dev/null 2>&1 || true
          chmod +x test.kexe
          set -o pipefail
          ./test.kexe "--ktest_gradle_filter=$AUTOBAHN_FILTER" 2>&1 | tee native-diagnostics/output.txt
      # linuxArm64 shares src/linuxTest, so it reports under the same "LinuxX64" agent name.
      - name: Validate results
        run: python3 .github/scripts/validate_autobahn.py LinuxX64
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autobahn-report-linuxarm64
          path: .docker/reports/clients
          retention-days: 7
      - name: Upload Linux arm64 diagnostics (backtrace / core dump)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: autobahn-linuxarm64-diagnostics
          path: native-diagnostics
          retention-days: 7
          if-no-files-found: ignore

  # ----------------------------------------------------------------------------------- Apple
  # macOS GitHub runners have no Docker daemon, so we bring one up via Colima to host the
  # fuzzingserver. The KotlinNativeTest finalizer validates the "LinuxX64" agent (vacuous on
  # macOS), so we additionally validate the real "macOS" agent explicitly.
  apple:
    name: "Apple (macOS)"
    # Intel runner: GitHub's hosted ARM macOS runners (macos-14, M1) lack nested virtualization, so
    # Colima can't start the fuzzingserver there. macos-15-intel runs Colima natively (HVF), so it can
    # host the amd64 crossbario/autobahn-testsuite image and we test the macosX64 target on it.
    runs-on: macos-15-intel
    timeout-minutes: 60
    # Kept non-blocking until this Intel-runner path is proven stable in CI; flip to blocking after.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: gradle
      - name: Cache Konan
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-macos-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-macos-
      - name: Start Docker (Colima)
        run: |
          brew install colima docker
          # Native x86_64 on the Intel runner — no --arch emulation needed.
          colima start --cpu 3 --memory 6
      - name: Run Autobahn (macosX64)
        run: |
          ulimit -c unlimited || true
          ./gradlew macosX64Test -PintegrationTests --tests "$AUTOBAHN_FILTER" --no-build-cache
      - name: Validate results (macOS agent)
        run: python3 .github/scripts/validate_autobahn.py macOS
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autobahn-report-apple
          path: .docker/reports/clients
          retention-days: 7
      # On failure: Gradle test reports hold the Kotlin/Native crash backtrace + per-test stdout;
      # grab any core dumps too (best-effort — /cores needs the ulimit above).
      - name: Upload Apple diagnostics (backtrace / core dumps)
        if: failure()
        run: |
          mkdir -p apple-diagnostics
          sudo cp /cores/* apple-diagnostics/ 2>/dev/null || true
          cp -R build/reports/tests apple-diagnostics/reports 2>/dev/null || true
          cp -R build/test-results apple-diagnostics/test-results 2>/dev/null || true
      - name: Upload Apple diagnostics artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: autobahn-apple-diagnostics
          path: apple-diagnostics
          retention-days: 7
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------------- Android
  # Emulator on an ubuntu runner (Docker is native here). connectedDebugAndroidTest is wired to
  # start the fuzzingserver, adb-reverse :9001, and validate the "Android" agent. The instrumented
  # build raises minSdk to 34 (-PinstrumentedTestsMinSdk34, so D8 emits a dex version allowing spaces
  # in Kotlin backtick test names), so the emulator API must be >= 34 to be a compatible device.
  android:
    name: "Android (emulator)"
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    # Non-blocking: emulator + instrumented-manifest setup still being shaken out. Follow-up.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: gradle
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run Autobahn (Android emulator)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: default
          # API 34+ ships no 32-bit x86 system image — only x86_64.
          arch: x86_64
          # Cap userdata so the emulator doesn't FATAL "not enough space" at launch (API 34's default
          # userdata partition is large). Mirrors DitchOoM/socket's proven android_integration config.
          disk-size: 4096M
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          # Root task only (leading ':'): the Autobahn instrumented tests live in the root module's
          # androidInstrumentedTest. -PinstrumentedTestsMinSdk34 raises the root minSdk to 34; the
          # unqualified task would also run :websocket-tcp:, whose androidTest stays at minSdk 23 and
          # fails the manifest merge against the (34) root library.
          #
          # Scope to the Autobahn conformance suite, matching the other legs' `--tests AutobahnCase*`.
          # connectedAndroidTest ignores Gradle's `--tests` glob, so exclude the non-Autobahn
          # integration classes via the instrumentation runner's notClass arg: PublicWssValidationTest
          # hits flaky public endpoints (echo.websocket.org/hivemq); WebSocketTests targets 127.0.0.1,
          # which on the emulator is the device itself (only :9001 is adb-reversed to the fuzzingserver).
          script: |
            set +e
            # STREAM logcat to a file BEFORE the tests run — do NOT rely on a post-mortem `logcat -d`.
            # A process-wide OOM (the case-9 read-buffer-pool OOM) crashes the instrumented app on a
            # background dispatcher and the runner tears the emulator down ~1s after BUILD FAILED, so a
            # post-run dump races the teardown and can capture nothing (an earlier run uploaded an EMPTY
            # diagnostics artifact for exactly this reason). A background stream started up front already
            # holds the ART OOM stack + `malloc_space fragmentation` detail by the time the crash hits.
            mkdir -p android-diagnostics
            adb logcat -c 2>/dev/null || true
            adb logcat -v threadtime > android-diagnostics/logcat.txt 2>&1 &
            logcat_pid=$!
            ./gradlew :connectedDebugAndroidTest -PintegrationTests -PinstrumentedTestsMinSdk34 -Pandroid.testInstrumentationRunnerArguments.notClass=com.ditchoom.websocket.PublicWssValidationTest,com.ditchoom.websocket.WebSocketTests --no-build-cache
            code=$?
            # Best-effort post-mortem snapshots (never fail the job on these).
            adb shell dumpsys meminfo com.ditchoom.websocket.test > android-diagnostics/meminfo.txt 2>&1 || true
            adb root >/dev/null 2>&1 || true
            adb pull /data/tombstones android-diagnostics/tombstones 2>/dev/null || true
            # Preserve gradle's instrumented-test report: it echoes the ART "Logcat of last crash" OOM
            # stack (how this run's OOM was actually recovered) even if on-device capture came up empty.
            cp -R build/reports/androidTests android-diagnostics/androidTests-report 2>/dev/null || true
            kill "$logcat_pid" 2>/dev/null || true
            exit $code
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autobahn-report-android
          path: .docker/reports/clients
          retention-days: 7
      - name: Upload Android diagnostics (logcat / tombstones / meminfo)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autobahn-android-diagnostics
          path: android-diagnostics
          retention-days: 7
          if-no-files-found: ignore
