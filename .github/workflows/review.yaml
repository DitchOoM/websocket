name: "Build and Test"
on:
  pull_request:
    paths-ignore:
      - '*.md'
    types:
      - synchronize
      - opened
jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 19
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '19'
          cache: gradle
      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v3
      - name: Unit tests Major
        if: ${{ contains(github.event.pull_request.labels.*.name, 'major') }}
        run: ./gradlew check publishToMavenLocal -PincrementMajor=true
      - name: Unit tests Minor
        if: ${{ contains(github.event.pull_request.labels.*.name, 'minor') }}
        run: ./gradlew check publishToMavenLocal -PincrementMinor=true
      - name: Unit tests Patch
        if: ${{ !contains(github.event.pull_request.labels.*.name, 'major') && !contains(github.event.pull_request.labels.*.name, 'minor') }}
        run: ./gradlew check publishToMavenLocal

  integration-tests:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 19
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '19'
          cache: gradle
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v3
      - name: Setup docker
        run: brew install docker colima
      - name: Integration tests
        run: ./gradlew allTests -PintegrationTests
