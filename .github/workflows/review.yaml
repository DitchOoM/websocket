name: "Build and Test"
on:
  pull_request:
    paths-ignore:
      - '*.md'
    types:
      - synchronize
      - opened

jobs:
  build-linux:
    uses: ./.github/workflows/build-linux.yaml

  build-apple:
    uses: ./.github/workflows/build-apple.yaml

  validate:
    needs: [build-linux, build-apple]
    uses: ./.github/workflows/validate-artifacts.yaml
    with:
      version: ${{ needs.build-linux.outputs.version }}

  integration-tests:
    name: "Integration Tests (Autobahn)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Integration tests are informational - network flakiness shouldn't block PRs
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: gradle
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v3
      - name: Run integration tests
        run: ./gradlew jvmTest jsNodeTest jsBrowserTest -PintegrationTests
