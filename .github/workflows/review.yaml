name: "Build and Test"
on:
  pull_request:
    paths-ignore:
      - '*.md'
    types:
      - synchronize
      - opened
jobs:
  jvm-js-tests:
    name: "JVM/JS Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: gradle
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v3
      - name: Run tests
        run: ./gradlew ktlintCheck jvmTest jsNodeTest jsBrowserTest

  apple-tests:
    name: "Apple Target Tests"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: gradle
      - name: Cache Konan
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-v2-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v3
      - name: Clean and Unit tests
        run: ./gradlew clean macosArm64Test iosSimulatorArm64Test --no-build-cache --rerun-tasks
      - name: WebSocket integration tests (echo server)
        run: ./gradlew macosArm64Test -PintegrationTests --tests "com.ditchoom.websocket.WebSocketTests" --no-build-cache

  integration-tests:
    name: "Integration Tests (Autobahn)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: gradle
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v3
      - name: Run integration tests
        run: ./gradlew jvmTest jsNodeTest jsBrowserTest -PintegrationTests
