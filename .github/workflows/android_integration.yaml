name: "Android Emulator Integration Test"
on:
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.gitignore'
      - '.editorconfig'
    types:
      - synchronize
      - opened
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      # Don't let one API level's failure cancel the others.
      fail-fast: false
      matrix:
        # Library minSdk is 23, so the emulator API must be >= 23. (API 19 could never install the
        # APK — "minSdkVersion [23] > deviceApiLevel [19]" — which is what used to red this job.)
        api-level: [29, 34]
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: gradle
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          # arch + disk in the key so a stale x86 / larger-disk AVD is never restored.
          key: avd-x86_64-${{ matrix.api-level }}-disk4096

      - name: create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: default
          # API 34+ ships no 32-bit x86 system image — only x86_64.
          arch: x86_64
          # Cap userdata so the emulator doesn't FATAL "not enough space" at launch (API 34's default
          # userdata partition is large). Mirrors DitchOoM/socket's proven android_integration config.
          disk-size: 4096M
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: run tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: default
          # API 34+ ships no 32-bit x86 system image — only x86_64.
          arch: x86_64
          # Cap userdata so the emulator doesn't FATAL "not enough space" at launch (API 34's default
          # userdata partition is large). Mirrors DitchOoM/socket's proven android_integration config.
          disk-size: 4096M
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew connectedCheck