name: "Build & Test (Linux)"

on:
  workflow_call:
    inputs:
      gradle-args:
        description: "Extra Gradle arguments (e.g., -PincrementMinor=true)"
        required: false
        default: ""
        type: string
    outputs:
      version:
        description: "Computed next version"
        value: ${{ jobs.build.outputs.version }}

jobs:
  build:
    name: "Linux / JVM / JS / Android"
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: gradle

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Cache Konan
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-linux-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-linux-

      - name: Get version
        id: version
        run: echo "version=$(./gradlew -q nextVersion ${{ inputs.gradle-args }})" >> $GITHUB_OUTPUT

      - name: Run JVM / JS / Android tests
        run: >-
          ./gradlew ktlintCheck
          jvmTest jsNodeTest jsBrowserTest testDebugUnitTest
          --no-build-cache ${{ inputs.gradle-args }}

      - name: Run Linux x64 tests
        run: >-
          ./gradlew linuxX64Test
          --no-build-cache ${{ inputs.gradle-args }}

      - name: Publish to Maven Local
        run: ./gradlew publishToMavenLocal --no-build-cache ${{ inputs.gradle-args }}

      - name: Upload Maven local artifacts
        uses: actions/upload-artifact@v4
        with:
          name: maven-local-linux
          path: ~/.m2/repository/com/ditchoom
          retention-days: 3

      - name: Build ARM64 test binary
        run: >-
          ./gradlew linkDebugTestLinuxArm64
          --no-build-cache ${{ inputs.gradle-args }}

      - name: Upload ARM64 test binary
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-test-binary
          path: build/bin/linuxArm64/debugTest/test.kexe
          retention-days: 1

  test-arm64:
    name: "Linux ARM64 (native)"
    needs: build
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    steps:
      - name: Download ARM64 test binary
        uses: actions/download-artifact@v4
        with:
          name: linux-arm64-test-binary

      - name: Run ARM64 tests
        run: |
          chmod +x test.kexe
          ./test.kexe --ktest_negative_filter=com.ditchoom.websocket.Autobahn*,com.ditchoom.websocket.WebSocketTests,com.ditchoom.websocket.PublicWssValidationTest,com.ditchoom.websocket.ProfilingTest,com.ditchoom.websocket.TimingProfilingTest
